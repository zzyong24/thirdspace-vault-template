id: article
name: 文章引擎
description: "从知识库聚合素材，生成长篇文章（洞察/教程/叙事/清单 4 种风格）"
icon: "✍️"
category: creation
tools:
  - name: draft_article
    description: Aggregate materials from vault for AI to write an article
    params:
      - name: topic
        type: string
        required: false
      - name: focus
        type: string
        required: false
      - name: style
        type: string
        required: false
        default: insight
      - name: days
        type: int
        required: false
        default: 30
      - name: prompt_name
        type: string
        required: false
  - name: save_article
    description: Save AI-generated article to vault
    params:
      - name: title
        type: string
        required: true
      - name: content
        type: string
        required: true
      - name: topic
        type: string
        required: false
      - name: tags
        type: list
        required: false
      - name: sources
        type: list
        required: false
      - name: publish_to
        type: string
        required: false
  - name: list_articles
    description: List existing articles with optional filters
    params:
      - name: topic
        type: string
        required: false
      - name: days
        type: int
        required: false
        default: 90
prompts:
  - name: draft-guidance
    path: prompts/draft-guidance.md
    variables:
      - topic
      - style
triggers:
  - "写文章"
  - "草稿"
  - "素材聚合"
  - "发布文章"
dependencies: []
